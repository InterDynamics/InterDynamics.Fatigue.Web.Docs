site_name: FAID Quantum Web App
site_description: User guide for the FAID Quantum web application
site_author: InterDynamics

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Settings: settings.md
  - Assessments: assessments.md
  - Analysis outputs: analysis-outputs.md
  - Related documents: related-documents.md
  - Download: download.md

plugins:
  - search
  - with-pdf:
      output_path: pdf/FAID_Quantum_Web_App_User_Guide_v2.pdf
      author: "InterDynamics Pty Ltd"
      cover: true
      back_cover: false
      cover_subtitle: ""
      copyright: "© 2026"
      exclude_pages:
        - 'download/'
